<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReplyAgent — AI Email Replies for Real Estate Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --blue: #1a73e8;
      --blue-dark: #1557b0;
      --blue-light: #e8f0fe;
      --ink: #0f1923;
      --ink-2: #3d4a56;
      --ink-3: #6b7885;
      --rule: #e4e8ec;
      --surface: #f7f9fc;
      --white: #ffffff;
      --green: #137333;
      --green-bg: #e6f4ea;
      --red: #c5221f;
      --red-bg: #fce8e6;
      --radius: 10px;
      --shadow: 0 2px 16px rgba(15,25,35,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--white);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-logo { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--ink); letter-spacing: -0.3px; }
    .nav-logo span { color: var(--blue); }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-size: 14px; color: var(--ink-2); text-decoration: none; }
    .nav-links a:hover { color: var(--blue); }

    .btn { padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--rule); }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Hero & Auth ── */
    .hero { max-width: 900px; margin: 0 auto; padding: 80px 24px 60px; text-align: center; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase; }
    .hero h1 { font-family: 'Instrument Serif', serif; font-size: clamp(36px, 5vw, 58px); line-height: 1.12; color: var(--ink); letter-spacing: -0.5px; margin-bottom: 20px; }
    .hero h1 em { font-style: italic; color: var(--blue); }
    .hero p { font-size: 17px; color: var(--ink-2); line-height: 1.7; max-width: 560px; margin: 0 auto 36px; }

    .auth-section { max-width: 460px; margin: 0 auto 80px; }
    .auth-card { background: var(--white); border: 1px solid var(--rule); border-radius: 16px; padding: 36px; box-shadow: var(--shadow); }

    .auth-tabs { display: flex; background: var(--surface); border-radius: 8px; padding: 3px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--ink-3); cursor: pointer; transition: all 0.15s; }
    .auth-tab.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-input { width: 100%; padding: 11px 13px; border: 1px solid var(--rule); border-radius: 8px; font-size: 14px; color: var(--ink); outline: none; transition: border-color 0.15s; font-family: inherit; }
    .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
    .form-input.code-input { font-size: 24px; font-weight: 700; letter-spacing: 8px; text-align: center; color: var(--blue); }

    .btn-full { width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: var(--blue); color: white; transition: background 0.15s; font-family: inherit; }
    .btn-full:hover { background: var(--blue-dark); }
    .btn-full:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-link { background: none; border: none; color: var(--blue); font-size: 13px; cursor: pointer; text-decoration: underline; font-family: inherit; padding: 0; }
    
    .auth-footer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--ink-3); }

    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
    .alert-success { background: var(--green-bg); color: var(--green); }
    .alert-error { background: var(--red-bg); color: var(--red); }
    .alert-info { background: var(--blue-light); color: var(--blue); }

    .spinner { width: 18px; height: 18px; border: 2px solid #e0e0e0; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-logo">Reply<span>Agent</span></div>
  <div class="nav-links">
    <button class="btn btn-ghost" onclick="document.getElementById('auth-card').scrollIntoView({behavior:'smooth'})">Sign in</button>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-eyebrow">✉️ For Real Estate Agents</div>
  <h1>Reply to every client email<br>in <em>30 seconds</em></h1>
  <p>AI drafts that sound exactly like you. Built for agents, not inboxes.</p>
</section>

<!-- Auth & Profile Section -->
<div class="auth-section" id="auth-card">
  
  <!-- LOGIN CARD -->
  <div class="auth-card" id="card-login">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Sign in</button>
      <button class="auth-tab" onclick="showTab('signup')">Create account</button>
    </div>
    <div id="alert" style="display:none" class="alert"></div>

    <div id="step-email">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" id="email-input" placeholder="you@gmail.com" onkeydown="if(event.key==='Enter') sendCode()" />
      </div>
      <button class="btn-full" id="send-btn" onclick="sendCode()">Send login code →</button>
      <div class="auth-footer">We'll email you a one-time code.</div>
    </div>

    <div id="step-otp" style="display:none">
      <div id="otp-info" class="alert alert-info" style="margin-bottom:16px"></div>
      <div class="form-group">
        <label class="form-label">Your login code</label>
        <input class="form-input code-input" type="text" inputmode="numeric" id="otp-input" placeholder="Enter code" oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter') verifyCode()" />
      </div>
      <button class="btn-full" id="verify-btn" onclick="verifyCode()">Verify & sign in →</button>
      <div class="auth-footer" style="margin-top:12px">
        <button class="btn-link" onclick="goBack()">← Different email or resend code</button>
      </div>
    </div>
  </div>

  <!-- PROFILE CARD (Shows after login) -->
  <div class="auth-card" id="card-profile" style="display:none;">
    <div style="text-align:center; margin-bottom:24px;">
      <div style="font-size: 32px; margin-bottom: 12px;">🎉</div>
      <h2 style="font-family:'Instrument Serif',serif; font-size:28px; margin-bottom:8px;">You're signed in!</h2>
      <p style="font-size:14px; color:var(--ink-2); line-height: 1.5;">Complete your agent profile below. The AI uses this to personalize your emails.</p>
    </div>

    <div id="profile-alert" style="display:none" class="alert"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="prof-name" placeholder="E.g. Sarah Jenkins" />
      </div>
      <div class="form-group">
        <label class="form-label">Brokerage</label>
        <input class="form-input" type="text" id="prof-brokerage" placeholder="E.g. Keller Williams" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-input" type="tel" id="prof-phone" placeholder="(555) 123-4567" />
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label">Market / City</label>
        <input class="form-input" type="text" id="prof-market" placeholder="E.g. Austin, TX" />
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label">Specialty</label>
        <input class="form-input" type="text" id="prof-specialty" placeholder="E.g. First-time buyers, Luxury Condos" />
      </div>
    </div>

    <button class="btn-full" id="save-profile-btn" onclick="saveProfile()" style="margin-top: 10px; margin-bottom: 20px;">Save Profile & Unlock Extension</button>
    <button class="btn-link" style="display:block; width:100%; text-align:center;" onclick="signOut()">Sign out</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── CONFIGURATION (PASTE YOUR REAL KEYS HERE!) ──────────────────────────
  const SUPABASE_URL = 'https://rkwpzubygaaqkrbyyhmu.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_V_pzVGdCZNm9KTYcM-uYdg_hEEYJmIU'
  const EXTENSION_ID = 'ffcbkeipcfkkgafnflapocbhlchlaioc' 
  // ──────────────────────────────────────────────────────────────────────────

  let currentEmail = ''
  let currentTab = 'login'
  let currentUser = null
  let sb = null

  if (typeof supabase !== 'undefined') {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    
    sb.auth.getSession().then(({ data }) => {
      if (data.session?.user) {
        currentUser = data.session.user
        sendTokenToExtension(data.session)
        showProfileScreen()
      }
    })

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session?.user) {
        currentUser = session.user
        sendTokenToExtension(session)
        showProfileScreen()
      }
    })
  }

  // --- UI Helpers ---
  function showTab(tab) {
    currentTab = tab
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'))
    })
    clearAlert()
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert')
    el.className = `alert alert-${type}`
    el.textContent = msg
    el.style.display = 'block'
  }

  function clearAlert() { document.getElementById('alert').style.display = 'none' }

  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId)
    btn.disabled = loading
    btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text
  }

  // --- Auth Flow ---
  async function sendCode() {
    const email = document.getElementById('email-input').value.trim()
    if (!email) { showAlert('Please enter your email address.'); return }
    currentEmail = email
    clearAlert()
    setLoading('send-btn', true, 'Sending…')

    const { error } = await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: (currentTab === 'signup') } })
    setLoading('send-btn', false, 'Send login code →')
    if (error) { showAlert(error.message); return }

    document.getElementById('step-email').style.display = 'none'
    document.getElementById('step-otp').style.display = 'block'
    document.getElementById('otp-info').textContent = `Code sent to ${email}. Check your inbox.`
    document.getElementById('otp-input').focus()
  }

  async function verifyCode() {
    const code = document.getElementById('otp-input').value.trim()
    if (!code) { showAlert('Please enter the code from your email.'); return }
    clearAlert()
    setLoading('verify-btn', true, 'Verifying…')

    try {
      const { data, error } = await sb.auth.verifyOtp({ email: currentEmail, token: code, type: 'email' })
      if (error) throw error;
      if (!data?.session) throw new Error("Verification succeeded, but no session data was returned.")
      
      currentUser = data.user
      sendTokenToExtension(data.session)
      showProfileScreen()
    } catch (err) {
      showAlert(err.message || 'Could not verify code.');
    } finally {
      setLoading('verify-btn', false, 'Verify & sign in →')
    }
  }

  function sendTokenToExtension(sessionData) {
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
      chrome.runtime.sendMessage(EXTENSION_ID, { type: "LOGIN_SUCCESS", session: sessionData });
    }
  }

  function goBack() {
    document.getElementById('step-otp').style.display = 'none'
    document.getElementById('step-email').style.display = 'block'
    document.getElementById('otp-input').value = ''
    clearAlert()
  }

  async function signOut() {
    await sb.auth.signOut()
    if (typeof chrome !== 'undefined' && chrome.storage) chrome.storage.local.remove('supabaseSession')
    currentUser = null
    document.getElementById('card-profile').style.display = 'none'
    document.getElementById('card-login').style.display = 'block'
    document.getElementById('step-email').style.display = 'block'
    document.getElementById('step-otp').style.display = 'none'
    document.getElementById('email-input').value = ''
  }

  // --- Profile Flow ---
  function showProfileScreen() {
    document.getElementById('card-login').style.display = 'none'
    document.getElementById('card-profile').style.display = 'block'
    fetchProfile()
  }

  async function fetchProfile() {
    if (!currentUser) return;
    try {
      const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      if (data) {
        document.getElementById('prof-name').value = data.full_name || '';
        document.getElementById('prof-brokerage').value = data.brokerage || '';
        document.getElementById('prof-phone').value = data.phone || '';
        document.getElementById('prof-market').value = data.market || '';
        document.getElementById('prof-specialty').value = data.specialty || '';
      }
    } catch (err) {
      console.log("No existing profile found. User can create one now.");
    }
  }

  async function saveProfile() {
    if (!currentUser) return;
    setLoading('save-profile-btn', true, 'Saving...');
    const profileAlert = document.getElementById('profile-alert');
    profileAlert.style.display = 'none';

    const updates = {
      id: currentUser.id, // Links to auth.users
      full_name: document.getElementById('prof-name').value.trim(),
      brokerage: document.getElementById('prof-brokerage').value.trim(),
      phone: document.getElementById('prof-phone').value.trim(),
      market: document.getElementById('prof-market').value.trim(),
      specialty: document.getElementById('prof-specialty').value.trim(),
      updated_at: new Date()
    };

    try {
      const { error } = await sb.from('profiles').upsert(updates);
      if (error) throw error;
      
      profileAlert.className = 'alert alert-success';
      profileAlert.innerHTML = '<strong>Profile saved!</strong> Your extension is ready to use. You can close this tab and return to Gmail.';
      profileAlert.style.display = 'block';
    } catch (err) {
      profileAlert.className = 'alert alert-error';
      profileAlert.textContent = err.message || 'Error saving profile.';
      profileAlert.style.display = 'block';
    } finally {
      setLoading('save-profile-btn', false, 'Save Profile & Unlock Extension');
    }
  }
</script>
</body>
</html>
